<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#0b0b0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>Русский · МК</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0b0f;--surf:#14141c;--card:#1c1c28;--bord:#2a2a3d;
      --red:#e63946;--gold:#ffd166;--txt:#f0edf5;--mute:#7a7a99;
      --green:#06d6a0;--blue:#4361ee;--purple:#9b5de5;--orange:#f4845f;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--txt);font-family:'Noto Serif',Georgia,serif;min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:100;}

    /* ═══ LOCK ═══ */
    #lock{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;gap:0;}
    #lock.hidden{display:none;}
    .li{font-size:48px;margin-bottom:18px;filter:drop-shadow(0 0 16px rgba(230,57,70,.5));}
    .ll{font-family:'Unbounded',sans-serif;font-weight:900;font-size:26px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:5px;}
    .ls{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:4px;color:var(--mute);text-transform:uppercase;margin-bottom:36px;}
    .ll2{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:3px;color:var(--mute);text-transform:uppercase;margin-bottom:10px;align-self:flex-start;width:100%;max-width:340px;}
    .lw{width:100%;max-width:340px;position:relative;margin-bottom:14px;}
    .linp{width:100%;background:var(--surf);border:1px solid var(--bord);border-radius:14px;padding:15px 48px 15px 18px;font-size:18px;color:var(--txt);font-family:'Noto Serif',serif;letter-spacing:3px;outline:none;transition:border-color .2s;}
    .linp:focus{border-color:var(--red);}
    .linp.err{border-color:var(--red);animation:shake .35s;}
    @keyframes shake{0%,100%{transform:translateX(0);}25%,75%{transform:translateX(-7px);}50%{transform:translateX(7px);}}
    .eyeb{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mute);font-size:19px;cursor:pointer;}
    .lbtn{width:100%;max-width:340px;background:linear-gradient(135deg,var(--red),#c1121f);border:none;border-radius:14px;padding:15px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:13px;letter-spacing:2px;color:white;cursor:pointer;margin-bottom:12px;transition:transform .15s;}
    .lbtn:active{transform:scale(.97);}
    .lerr{font-size:12px;color:var(--red);font-style:italic;min-height:18px;text-align:center;}

    /* ═══ APP ═══ */
    #app{display:flex;flex-direction:column;min-height:100dvh;}
    #app.hidden{display:none;}

    /* Header */
    header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(18px,5vw,23px);letter-spacing:-1px;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .logo-s{font-family:'Unbounded',sans-serif;font-weight:300;font-size:9px;letter-spacing:3px;color:var(--mute);text-transform:uppercase;}
    .streak{display:flex;flex-direction:column;align-items:center;background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:7px 13px;cursor:pointer;}
    .streak-n{font-family:'Unbounded',sans-serif;font-weight:900;font-size:19px;color:var(--gold);line-height:1;}
    .streak-l{font-family:'Unbounded',sans-serif;font-size:7px;letter-spacing:2px;color:var(--mute);text-transform:uppercase;margin-top:2px;}

    /* SRS bar */
    .srs-bar{margin:12px 20px 2px;background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:9px 14px;display:flex;justify-content:space-around;}
    .sc{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;}
    .sc+.sc{border-left:1px solid var(--bord);}
    .sn{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:900;}
    .sl{font-family:'Unbounded',sans-serif;font-size:7px;letter-spacing:1px;color:var(--mute);text-transform:uppercase;margin-top:1px;}
    .cb{color:var(--blue);}.cr{color:var(--red);}.cg{color:var(--green);}.co{color:var(--orange);}

    /* Stats strip */
    .stats{display:flex;gap:10px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;}
    .stats::-webkit-scrollbar{display:none;}
    .stat{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:9px 13px;min-width:132px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;}
    .st-l{font-family:'Unbounded',sans-serif;font-size:7px;font-weight:600;letter-spacing:2px;color:var(--mute);text-transform:uppercase;}
    .st-v{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--txt);}
    .st-e{font-size:11px;color:var(--gold);}
    .stat.big .st-v{color:var(--green);font-size:20px;font-weight:900;}

    /* Action buttons */
    .actions{display:flex;flex-direction:column;gap:10px;padding:6px 20px;}
    .bb{position:relative;border:none;border-radius:16px;padding:18px 20px;cursor:pointer;text-align:left;overflow:hidden;transition:transform .15s;}
    .bb:active{transform:scale(.97);}
    .bg{position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;pointer-events:none;}
    .bb-w{background:linear-gradient(135deg,#1a0a0e,#2d0f15);border:1px solid #4a1520;}
    .bb-w .bg{background:radial-gradient(circle,rgba(230,57,70,.28) 0%,transparent 70%);}
    .bb-r{background:linear-gradient(135deg,#0a0e1a,#0f1530);border:1px solid #152040;}
    .bb-r .bg{background:radial-gradient(circle,rgba(67,97,238,.28) 0%,transparent 70%);}
    .bb-q{background:linear-gradient(135deg,#0d0a1a,#190f2e);border:1px solid #271545;}
    .bb-q .bg{background:radial-gradient(circle,rgba(155,93,229,.28) 0%,transparent 70%);}
    .brow{display:flex;gap:10px;}
    .brow .bb{flex:1;padding:16px 13px;}
    .bi{font-size:24px;display:block;margin-bottom:5px;}
    .bt{font-family:'Unbounded',sans-serif;font-weight:600;font-size:clamp(12px,3vw,14px);display:block;margin-bottom:2px;}
    .bb-w .bt{color:var(--red);}
    .bb-r .bt{color:var(--blue);}
    .bb-q .bt{color:#b48ef5;}
    .bd{font-size:10px;color:var(--mute);font-style:italic;}
    .ba{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--mute);}

    /* Progress */
    .prog{padding:6px 20px 14px;}
    .prog-l{font-family:'Unbounded',sans-serif;font-size:7px;letter-spacing:3px;color:var(--mute);text-transform:uppercase;margin-bottom:7px;}
    .prog-bg{height:4px;background:var(--surf);border-radius:99px;overflow:hidden;}
    .prog-f{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:99px;transition:width .7s ease;}
    .prog-t{font-size:10px;color:var(--mute);margin-top:5px;font-style:italic;}

    /* ═══ OVERLAYS ═══ */
    .ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;}
    .ov.on{display:flex;}
    .modal{background:var(--surf);border:1px solid var(--bord);border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:93dvh;overflow-y:auto;padding:20px 20px 44px;animation:su .32s cubic-bezier(.34,1.56,.64,1);position:relative;}
    @keyframes su{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
    .mh{width:36px;height:4px;background:var(--bord);border-radius:99px;margin:0 auto 18px;}
    .xb{position:absolute;top:12px;right:12px;background:var(--card);border:1px solid var(--bord);border-radius:50%;width:31px;height:31px;font-size:15px;cursor:pointer;color:var(--mute);display:flex;align-items:center;justify-content:center;}
    .modal::-webkit-scrollbar{width:3px;}
    .modal::-webkit-scrollbar-thumb{background:var(--bord);border-radius:4px;}

    /* Section labels */
    .sec{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-bottom:13px;}
    .sec-r{color:var(--red);}.sec-b{color:var(--blue);}.sec-p{color:#b48ef5;}.sec-g{color:var(--green);}.sec-o{color:var(--orange);}

    /* Word card (WOTD + preview) */
    .ruw{font-size:clamp(30px,8.5vw,46px);font-weight:700;line-height:1.1;margin-bottom:3px;}
    .trl{font-style:italic;color:var(--mute);font-size:14px;margin-bottom:4px;}
    .wtyp{display:inline-block;background:var(--card);border:1px solid var(--bord);border-radius:6px;padding:3px 10px;font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:1px;color:var(--mute);margin-bottom:15px;}
    .div{height:1px;background:var(--bord);margin:12px 0;}
    .dl{font-family:'Unbounded',sans-serif;font-size:8px;letter-spacing:3px;color:var(--mute);text-transform:uppercase;margin-bottom:5px;}
    .dt{font-size:18px;line-height:1.5;color:var(--txt);font-weight:700;}
    .dt.phrase{font-size:15px;}
    .en-hint{font-size:12px;color:var(--mute);font-style:italic;margin-top:3px;}
    .ex{font-size:13px;font-style:italic;color:var(--mute);margin-top:8px;padding-left:12px;border-left:2px solid var(--red);line-height:1.5;}
    .srs-pill{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:8px 13px;margin-top:12px;font-size:11px;color:var(--mute);font-style:italic;}

    /* Edit translation inline */
    .edit-row{display:flex;gap:8px;margin-top:10px;align-items:center;}
    .edit-inp{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:9px 13px;font-size:15px;color:var(--txt);font-family:'Noto Serif',serif;outline:none;transition:border-color .2s;}
    .edit-inp:focus{border-color:var(--gold);}
    .edit-save{background:var(--gold);border:none;border-radius:10px;padding:9px 14px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:#000;cursor:pointer;white-space:nowrap;}
    .edit-cancel{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:9px 14px;font-family:'Unbounded',sans-serif;font-size:10px;color:var(--mute);cursor:pointer;}
    .edit-trigger{background:none;border:none;color:var(--mute);font-size:12px;cursor:pointer;text-decoration:underline;font-family:'Noto Serif',serif;font-style:italic;margin-top:4px;display:block;}

    /* Save button */
    .sav{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--red),#c1121f);border:none;border-radius:13px;padding:14px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:12px;color:white;cursor:pointer;letter-spacing:1px;transition:transform .15s;}
    .sav:active{transform:scale(.97);}
    .sav.saved{background:linear-gradient(135deg,var(--green),#04a07a);}

    /* Loading */
    .ld{display:flex;flex-direction:column;align-items:center;gap:13px;padding:36px 0;color:var(--mute);}
    .spin{width:32px;height:32px;border:3px solid var(--bord);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    /* ═══ FLASHCARDS ═══ */
    .fc-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .fc-cnt{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--mute);}
    .fc{background:var(--card);border:1px solid var(--bord);border-radius:16px;min-height:175px;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px 16px;cursor:pointer;transition:transform .1s,border-color .2s;user-select:none;}
    .fc:active{transform:scale(.98);}
    .fc.due-glow{border-color:rgba(230,57,70,.4);}
    .fch{font-size:11px;color:var(--mute);font-style:italic;margin-top:9px;}
    .fca{display:none;}
    .fc.fl .fcq{display:none;}.fc.fl .fca{display:block;}.fc.fl .fch{display:none;}
    .fcw{font-size:clamp(22px,6.5vw,34px);font-weight:700;margin-bottom:4px;}
    .fcw.phrase{font-size:clamp(16px,4.5vw,22px);}
    .fct{font-style:italic;color:var(--mute);font-size:12px;}
    .fcd{font-size:15px;line-height:1.5;font-weight:700;}
    .fcd.phrase{font-size:13px;}
    .fc-acts{display:flex;gap:8px;margin-top:13px;}
    .fcb{flex:1;border:none;border-radius:11px;padding:12px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:transform .15s;}
    .fcb:active{transform:scale(.96);}
    .b-ag{background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3);}
    .b-hd{background:rgba(255,209,102,.12);color:var(--gold);border:1px solid rgba(255,209,102,.3);}
    .b-ok{background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3);}
    .fc-nav2{display:flex;gap:8px;margin-top:8px;}
    .fcnb{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:10px;color:var(--mute);font-family:'Unbounded',sans-serif;font-size:10px;cursor:pointer;}

    /* Rev tabs */
    .rtabs{display:flex;gap:7px;margin-bottom:14px;}
    .rtab{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:9px;font-family:'Unbounded',sans-serif;font-size:10px;color:var(--mute);cursor:pointer;text-align:center;transition:all .15s;}
    .rtab.on{background:var(--blue);border-color:var(--blue);color:white;}

    /* Word list */
    .srch{width:100%;background:var(--card);border:1px solid var(--bord);border-radius:11px;padding:10px 15px;font-size:14px;color:var(--txt);font-family:'Noto Serif',serif;outline:none;transition:border-color .2s;margin-bottom:10px;}
    .srch::placeholder{color:var(--mute);}
    .srch:focus{border-color:var(--blue);}
    .wli{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border:1px solid var(--bord);border-radius:11px;margin-bottom:7px;cursor:pointer;}
    .wli:active{transform:scale(.99);}
    .wru{font-size:16px;font-weight:700;}
    .wmk{font-size:12px;color:var(--mute);font-style:italic;}
    .wsrs{font-size:10px;margin-top:1px;}
    .wli-r{display:flex;align-items:center;gap:4px;}
    .wdel{background:none;border:none;color:var(--mute);font-size:16px;cursor:pointer;padding:3px 7px;}
    .wedit{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:3px 5px;}

    /* ═══ QUIZ ═══ */
    .qsc{font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:2px;color:var(--mute);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
    .qsc-streak{color:var(--gold);}
    .qq{font-size:clamp(24px,7.5vw,38px);font-weight:700;text-align:center;margin:16px 0 4px;}
    .qq.phrase{font-size:clamp(16px,4.5vw,22px);}
    .qt{text-align:center;color:var(--mute);font-style:italic;margin-bottom:18px;font-size:13px;}
    .qmode-tabs{display:flex;gap:7px;margin-bottom:16px;}
    .qmode-tab{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:9px;padding:8px;font-family:'Unbounded',sans-serif;font-size:9px;color:var(--mute);cursor:pointer;text-align:center;transition:all .15s;}
    .qmode-tab.on{background:var(--purple);border-color:var(--purple);color:white;}
    .qopts{display:flex;flex-direction:column;gap:9px;}
    .qopt{background:var(--card);border:1.5px solid var(--bord);border-radius:13px;padding:14px 16px;font-size:14px;cursor:pointer;transition:all .2s;text-align:left;color:var(--txt);}
    .qopt:active{transform:scale(.98);}
    .qopt.right{background:rgba(6,214,160,.18);border-color:var(--green);color:var(--green);}
    .qopt.wrong{background:rgba(230,57,70,.13);border-color:var(--red);color:var(--red);}
    .qopt.disabled{cursor:default;opacity:.6;}
    /* Type-in quiz */
    .qtype-wrap{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
    .qtype-inp{background:var(--card);border:2px solid var(--bord);border-radius:13px;padding:14px 16px;font-size:16px;color:var(--txt);font-family:'Noto Serif',serif;outline:none;transition:border-color .2s;text-align:center;}
    .qtype-inp:focus{border-color:var(--purple);}
    .qtype-inp.right{border-color:var(--green);background:rgba(6,214,160,.1);}
    .qtype-inp.wrong{border-color:var(--red);background:rgba(230,57,70,.08);}
    .qtype-hint{font-size:12px;color:var(--mute);text-align:center;font-style:italic;min-height:18px;}
    .qcheck{width:100%;background:linear-gradient(135deg,var(--purple),#7b2fbe);border:none;border-radius:13px;padding:14px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:12px;color:white;cursor:pointer;letter-spacing:1px;transition:transform .15s;}
    .qcheck:active{transform:scale(.97);}
    .qnext{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--blue),#2a45cc);border:none;border-radius:13px;padding:13px;font-family:'Unbounded',sans-serif;font-weight:600;font-size:12px;color:white;cursor:pointer;letter-spacing:1px;display:none;}
    .q-result{text-align:center;padding:10px 0 4px;font-size:14px;min-height:26px;font-weight:700;}
    .q-result.ok{color:var(--green);}
    .q-result.bad{color:var(--red);}

    /* ═══ SETTINGS ═══ */
    .settings-btn{position:absolute;top:12px;left:12px;background:var(--card);border:1px solid var(--bord);border-radius:50%;width:31px;height:31px;font-size:15px;cursor:pointer;color:var(--mute);display:flex;align-items:center;justify-content:center;}
    .set-section{margin-bottom:20px;}
    .set-title{font-family:'Unbounded',sans-serif;font-size:9px;letter-spacing:3px;color:var(--mute);text-transform:uppercase;margin-bottom:12px;}
    .set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border:1px solid var(--bord);border-radius:12px;margin-bottom:8px;cursor:pointer;}
    .set-row:active{transform:scale(.99);}
    .set-row-label{font-size:14px;color:var(--txt);}
    .set-row-sub{font-size:11px;color:var(--mute);font-style:italic;margin-top:2px;}
    .set-arrow{color:var(--mute);font-size:16px;}

    /* Danger zone */
    .danger-btn{width:100%;background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.3);border-radius:12px;padding:13px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:var(--red);cursor:pointer;letter-spacing:1px;margin-bottom:8px;transition:all .15s;}
    .danger-btn:active{transform:scale(.98);}
    /* Confirm dialog */
    .confirm-box{background:var(--card);border:1px solid rgba(230,57,70,.4);border-radius:14px;padding:16px;margin-top:10px;display:none;}
    .confirm-box.show{display:block;}
    .confirm-text{font-size:13px;color:var(--txt);margin-bottom:12px;line-height:1.5;}
    .confirm-btns{display:flex;gap:8px;}
    .confirm-yes{flex:1;background:var(--red);border:none;border-radius:10px;padding:12px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:white;cursor:pointer;}
    .confirm-no{flex:1;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:12px;font-family:'Unbounded',sans-serif;font-size:11px;color:var(--mute);cursor:pointer;}

    /* ═══ EMPTY STATE ═══ */
    .emp{text-align:center;padding:44px 20px;color:var(--mute);}
    .emp .ei{font-size:40px;margin-bottom:12px;}
    .emp p{font-size:13px;line-height:1.6;}

    /* ═══ TOAST ═══ */
    .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;padding:11px 22px;border-radius:99px;z-index:600;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center;}
    .toast.on{transform:translateX(-50%) translateY(0);}
    .toast.warn{background:var(--gold);color:#000;}
    .toast.err{background:var(--red);color:#fff;}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>
<script>
'use strict';
// ── PASSPHRASE ────────────────────────────────────────────────────────────────
const PASSPHRASE = 'russki123';

// ── LOCK ──────────────────────────────────────────────────────────────────────
function checkLock(){ if(localStorage.getItem('rauth')==='1') showApp(); }
function unlock(){
  if(document.getElementById('linp').value===PASSPHRASE){
    localStorage.setItem('rauth','1'); showApp();
  } else {
    const i=document.getElementById('linp');
    document.getElementById('lerr').textContent='Погрешна лозинка.';
    i.classList.add('err'); setTimeout(()=>i.classList.remove('err'),400); i.value='';
  }
}
function toggleEye(){
  const i=document.getElementById('linp'),b=document.getElementById('eyeb');
  i.type=i.type==='password'?'text':'password'; b.textContent=i.type==='password'?'👁':'🙈';
}
function showApp(){
  document.getElementById('lock').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  init();
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const SK='russki_v4';
let S={
  learned:[],      // word objects with SRS fields
  lastWOTD:null,
  lastRev:null,
  usedRu:[],
  streak:0,
  lastStudy:null,
  qCorrect:0,
  qTotal:0,
  edits:{},        // { ru: { mk, en } } — user-edited translations
};
function loadS(){ try{const s=localStorage.getItem(SK);if(s)S={...S,...JSON.parse(s)};}catch(e){} }
function saveS(){ localStorage.setItem(SK,JSON.stringify(S)); }

// ── INDEXEDDB pool cache ──────────────────────────────────────────────────────
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('rdb2',1);
    r.onupgradeneeded=e=>{ const d=e.target.result; if(!d.objectStoreNames.contains('wp')) d.createObjectStore('wp',{keyPath:'id'}); };
    r.onsuccess=e=>{ db=e.target.result; res(); };
    r.onerror=e=>rej(e.target.error);
  });
}
function dbGet(id){ return new Promise((res,rej)=>{ const r=db.transaction('wp','readonly').objectStore('wp').get(id); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e); }); }
function dbPut(o){ return new Promise((res,rej)=>{ const r=db.transaction('wp','readwrite').objectStore('wp').put(o); r.onsuccess=()=>res(); r.onerror=e=>rej(e); }); }

let POOL=[];
const FB=[
  {ru:"привет",translit:"privet",type:"именка",mk:"здраво",en:"hello"},
  {ru:"спасибо",translit:"spasibo",type:"именка",mk:"благодарам",en:"thank you"},
  {ru:"понимать",translit:"ponimat'",type:"глагол",mk:"разбира",en:"to understand"},
  {ru:"говорить",translit:"govorit'",type:"глагол",mk:"зборува",en:"to speak"},
  {ru:"жизнь",translit:"zhizn'",type:"именка",mk:"живот",en:"life"},
];

async function loadPool(){
  try{
    await openDB();
    const cached=await dbGet('wc');
    if(cached&&cached.w&&cached.w.length>0){
      POOL=cached.w; applyEdits();
      document.getElementById('srstot').textContent=POOL.length;
      fetchPool(true); return;
    }
  }catch(e){ console.warn('IDB',e); }
  await fetchPool(false);
}

async function fetchPool(bg=false){
  try{
    const r=await fetch('./words.json',{cache:'no-cache'});
    if(!r.ok) throw 0;
    const w=await r.json();
    if(bg&&w.length===POOL.length) return;
    POOL=w; applyEdits();
    document.getElementById('srstot').textContent=POOL.length;
    if(db) await dbPut({id:'wc',w,ts:Date.now()});
  }catch(e){
    if(!bg){ POOL=FB; applyEdits(); document.getElementById('srstot').textContent=POOL.length+'*'; }
  }
}

// Apply user edits on top of the pool
function applyEdits(){
  if(!S.edits||!Object.keys(S.edits).length) return;
  POOL=POOL.map(w=>{
    const e=S.edits[w.ru];
    if(!e) return w;
    return {...w, mk:e.mk||w.mk, en:e.en!==undefined?e.en:w.en};
  });
}

// Force-refresh words from network (called from settings)
async function forceRefreshPool(){
  showToast('Се освежува речникот…','warn');
  if(db){ try{ await dbPut({id:'wc',w:[],ts:0}); }catch(e){} }
  await fetchPool(false);
  updateUI();
  showToast(`Зачуван нов речник: ${POOL.length} зборови 🎉`);
}

// ── SRS ───────────────────────────────────────────────────────────────────────
const DAY=86400000;
function srsInit(w){ return {...w,srs:{iv:1,ease:2.5,reps:0,next:Date.now()}}; }
function srsUpdate(w,r){
  const s={...w.srs||{iv:1,ease:2.5,reps:0,next:Date.now()}};
  if(r===0){ s.reps=0;s.iv=1; }
  else if(r===1){ s.reps=Math.max(0,s.reps-1);s.iv=Math.max(1,Math.round(s.iv*.8));s.ease=Math.max(1.3,s.ease-.15); }
  else{ s.reps+=1; s.iv=s.reps===1?1:s.reps===2?6:Math.round(s.iv*s.ease); s.ease=Math.max(1.3,s.ease+.1); }
  s.next=Date.now()+s.iv*DAY;
  return {...w,srs:s};
}
function srsDue(w){ return !w.srs||Date.now()>=w.srs.next; }
function srsTag(w){
  if(!w.srs||!w.srs.next) return '';
  const d=Math.max(0,Math.round((w.srs.next-Date.now())/DAY));
  if(d===0) return '🔴 Денес'; if(d===1) return '🟡 Утре'; return `🟢 за ${d}д`;
}

// ── STREAK ────────────────────────────────────────────────────────────────────
function bumpStreak(){
  const td=new Date().toDateString();
  if(S.lastStudy===td) return;
  S.streak=(S.lastStudy===new Date(Date.now()-DAY).toDateString())?(S.streak||0)+1:1;
  S.lastStudy=td; saveS();
}

// ── TIME ──────────────────────────────────────────────────────────────────────
function ft(iso){ if(!iso)return'Никогаш'; const d=new Date(iso); return d.toLocaleDateString('mk-MK',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('mk-MK',{hour:'2-digit',minute:'2-digit'}); }
function fe(iso){ if(!iso)return''; const m=Math.floor((Date.now()-new Date(iso))/60000),h=Math.floor(m/60),dy=Math.floor(h/24); return dy>0?`пред ${dy}д ${h%24}ч`:h>0?`пред ${h}ч ${m%60}м`:m>0?`пред ${m}м`:'Штотуку'; }

// ── UI UPDATE ─────────────────────────────────────────────────────────────────
function updateUI(){
  const cnt=S.learned.length;
  document.getElementById('scnt').textContent=cnt;
  document.getElementById('swt').textContent=ft(S.lastWOTD);  document.getElementById('swe').textContent=fe(S.lastWOTD);
  document.getElementById('srt').textContent=ft(S.lastRev);   document.getElementById('sre').textContent=fe(S.lastRev);
  document.getElementById('strn').textContent=S.streak||0;
  const acc=S.qTotal>0?Math.round(S.qCorrect/S.qTotal*100)+'%':'—';
  document.getElementById('sqacc').textContent=acc;
  const goal=Math.max(500,POOL.length||500);
  const pct=Math.min(100,Math.round(cnt/goal*100));
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=cnt===0?'Почни да учиш денес!':`${cnt} од ${goal} — ${pct}%`;
  const due=S.learned.filter(w=>srsDue(w)&&w.srs&&w.srs.reps>0).length;
  const nw=S.learned.filter(w=>!w.srs||w.srs.reps===0).length;
  const mst=S.learned.filter(w=>w.srs&&w.srs.iv>=21).length;
  document.getElementById('srsdue').textContent=due;
  document.getElementById('srsnew').textContent=nw;
  document.getElementById('srsmst').textContent=mst;
}
setInterval(updateUI,30000);

// ── OVERLAYS ──────────────────────────────────────────────────────────────────
function openOv(id){ document.getElementById(id).classList.add('on'); document.body.style.overflow='hidden'; }
function closeOv(id){ document.getElementById(id).classList.remove('on'); document.body.style.overflow=''; }
function closeBack(e,id){ if(e.target===document.getElementById(id)) closeOv(id); }

// ── TRANSLATION EDITOR ────────────────────────────────────────────────────────
function showEditForm(ru, currentMk, currentEn, containerId){
  const c=document.getElementById(containerId);
  if(!c) return;
  c.innerHTML=`
    <div class="edit-row">
      <input class="edit-inp" id="edit-mk-inp" value="${escH(currentMk)}" placeholder="Macedonian превод"/>
    </div>
    <div class="edit-row" style="margin-top:6px">
      <input class="edit-inp" id="edit-en-inp" value="${escH(currentEn||'')}" placeholder="English (опционално)"/>
    </div>
    <div class="edit-row" style="margin-top:8px">
      <button class="edit-save" onclick="saveEdit('${escH(ru)}','${containerId}')">✓ Зачувај</button>
      <button class="edit-cancel" onclick="cancelEdit('${containerId}','${escH(currentMk)}','${escH(currentEn||'')}')">Откажи</button>
    </div>`;
  document.getElementById('edit-mk-inp').focus();
}

function saveEdit(ru, containerId){
  const mkInp=document.getElementById('edit-mk-inp');
  const enInp=document.getElementById('edit-en-inp');
  if(!mkInp) return;
  const newMk=mkInp.value.trim();
  const newEn=enInp?enInp.value.trim():'';
  if(!newMk){ showToast('Преводот не може да биде празен','err'); return; }

  // Store edit
  if(!S.edits) S.edits={};
  S.edits[ru]={mk:newMk,en:newEn};
  saveS();

  // Apply to POOL
  POOL=POOL.map(w=>w.ru===ru?{...w,mk:newMk,en:newEn}:w);

  // Apply to learned words too
  S.learned=S.learned.map(w=>w.ru===ru?{...w,mk:newMk,en:newEn}:w);
  saveS();

  showToast('Преводот е зачуван ✓');

  // Refresh current view
  const c=document.getElementById(containerId);
  if(c){
    c.innerHTML=`
      <div class="dl">Македонски превод</div>
      <div class="dt${newMk.length>30?' phrase':''}">${escH(newMk)}</div>
      ${newEn?`<div class="en-hint">${escH(newEn)}</div>`:''}
      <button class="edit-trigger" onclick="showEditForm('${escH(ru)}','${escH(newMk)}','${escH(newEn)}','${containerId}')">✎ Измени превод</button>`;
  }
}

function cancelEdit(containerId, mk, en){
  const c=document.getElementById(containerId);
  if(!c) return;
  const ru=c.dataset.ru||'';
  c.innerHTML=`
    <div class="dl">Македонски превод</div>
    <div class="dt${mk.length>30?' phrase':''}">${escH(mk)}</div>
    ${en?`<div class="en-hint">${escH(en)}</div>`:''}
    <button class="edit-trigger" onclick="showEditForm('${c.dataset.ru||''}','${escH(mk)}','${escH(en)}','${containerId}')">✎ Измени превод</button>`;
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── WOTD ──────────────────────────────────────────────────────────────────────
let _pw=null;

function pickToday(){
  const td=new Date(); const seed=td.getFullYear()*10000+(td.getMonth()+1)*100+td.getDate();
  const av=POOL.filter(w=>!S.usedRu.includes(w.ru));
  const p=av.length?av:POOL; return p[seed%p.length];
}

function openWOTD(){
  openOv('wov'); S.lastWOTD=new Date().toISOString(); bumpStreak(); saveS(); updateUI();
  _pw=pickToday(); renderWOTD(_pw,false);
}

function renderWOTD(w,fromList){
  const saved=S.learned.some(x=>x.ru===w.ru);
  const isPhrase=w.ru.includes(' ');
  const mk=w.mk||'';
  const en=w.en||'';
  const editId='wotd-edit-zone';
  document.getElementById('wb').innerHTML=`
    <div class="sec sec-r">✦ ${fromList?'Преглед':'Збор на денот'}</div>
    <div class="ruw${isPhrase?' phrase':''}">${escH(w.ru)}</div>
    <div class="trl">${escH(w.translit||'')}</div>
    <span class="wtyp">${escH(w.type||'збор')}</span>
    <div class="div"></div>
    <div id="${editId}" data-ru="${escH(w.ru)}">
      <div class="dl">Македонски превод</div>
      <div class="dt${mk.length>30?' phrase':''}">${escH(mk)}</div>
      ${en?`<div class="en-hint">${escH(en)}</div>`:''}
      <button class="edit-trigger" onclick="showEditForm('${escH(w.ru)}','${escH(mk)}','${escH(en)}','${editId}')">✎ Измени превод</button>
    </div>
    ${w.example_ru?`<div class="div"></div><div class="dl">Пример</div>
    <div class="ex">${escH(w.example_ru)}</div>
    ${w.example_mk?`<div class="ex">${escH(w.example_mk)}</div>`:''}`:''}
    ${saved&&w.srs?`<div class="srs-pill">📅 Следна ревизија: ${srsTag(w)}</div>`:''}
    <button class="sav${saved?' saved':''}" id="savbtn" onclick="saveWord()">
      ${saved?'✓ Веќе зачуван':'＋ Зачувај го зборот'}</button>`;
}

function saveWord(){
  if(!_pw) return;
  if(!S.learned.some(w=>w.ru===_pw.ru)){
    S.learned.push(srsInit(_pw));
    if(!S.usedRu.includes(_pw.ru)) S.usedRu.push(_pw.ru);
    saveS(); updateUI();
  }
  const b=document.getElementById('savbtn');
  if(b){ b.textContent='✓ Зачуван!'; b.classList.add('saved'); }
  showToast('Зборот е зачуван! 🎉');
}

// ── REVISION ──────────────────────────────────────────────────────────────────
let fi=0,ff=false,deck=[],rmode='cards';

function openRevise(){
  openOv('rov'); S.lastRev=new Date().toISOString(); bumpStreak(); saveS(); updateUI();
  fi=0; ff=false;
  const due=S.learned.filter(srsDue), nd=S.learned.filter(w=>!srsDue(w));
  deck=[...shuf(due),...shuf(nd)];
  renderRev();
}

function renderRev(){
  const el=document.getElementById('rb');
  if(!S.learned.length){
    el.innerHTML=`<div class="sec sec-b">🃏 Ревизија</div><div class="emp"><div class="ei">📚</div>
      <p>Сè уште немаш зборови.<br>Прво зачувај зборови преку <strong>Збор на денот</strong>.</p></div>`; return;
  }
  const tabs=`<div class="rtabs">
    <div class="rtab${rmode==='cards'?' on':''}" onclick="swRev('cards')">🃏 Флешкарти</div>
    <div class="rtab${rmode==='list'?' on':''}" onclick="swRev('list')">📋 Листа</div>
  </div>`;
  el.innerHTML=tabs+(rmode==='cards'?cardH():listH());
  if(rmode==='list') document.getElementById('lsrch').addEventListener('input',fList);
}
function swRev(m){ rmode=m; fi=0; ff=false; renderRev(); }

function cardH(){
  if(!deck.length) return '<div class="emp"><p>Нема картички.</p></div>';
  const w=deck[fi];
  const due=deck.slice(fi).filter(srsDue).length;
  const isPhrase=w.ru.includes(' ');
  return `<div class="sec sec-b">🃏 Флешкарти</div>
    <div class="fc-nav">
      <span class="fc-cnt">${fi+1}/${deck.length}</span>
      <span style="font-size:11px;color:var(--mute)">🔴 ${due} за денес</span>
    </div>
    <div class="fc${srsDue(w)?' due-glow':''}" id="fc" onclick="flip()">
      <div class="fcq">
        <div class="fcw${isPhrase?' phrase':''}">${escH(w.ru)}</div>
        <div class="fct">${escH(w.translit||'')}</div>
      </div>
      <div class="fca">
        <div class="fcd${isPhrase?' phrase':''}">${escH(w.mk||'')}</div>
        ${w.en?`<div style="font-size:11px;color:var(--mute);margin-top:3px;font-style:italic">${escH(w.en)}</div>`:''}
        ${w.example_ru?`<div class="ex" style="margin-top:10px;text-align:left;font-size:12px">${escH(w.example_ru)}</div>`:''}
        <div style="margin-top:7px;font-size:11px;color:var(--mute)">${srsTag(w)}</div>
      </div>
      <div class="fch">Тапни за да го видиш преводот</div>
    </div>
    <div class="fc-acts" id="fca" style="display:none">
      <button class="fcb b-ag" onclick="rate(0)">↩ Пак</button>
      <button class="fcb b-hd" onclick="rate(1)">~ Тешко</button>
      <button class="fcb b-ok" onclick="rate(2)">✓ Знам</button>
    </div>
    <div class="fc-nav2">
      <button class="fcnb" onclick="fcPrev()">← Претх.</button>
      <button class="fcnb" onclick="fcNext()">Следно →</button>
    </div>`;
}

function flip(){
  const c=document.getElementById('fc'),a=document.getElementById('fca');
  if(!c) return;
  ff=!ff; if(ff){c.classList.add('fl');a.style.display='flex';}else{c.classList.remove('fl');a.style.display='none';}
}
function rate(r){
  const w=deck[fi]; const idx=S.learned.findIndex(x=>x.ru===w.ru);
  if(idx>=0){ S.learned[idx]=srsUpdate(S.learned[idx],r); saveS(); updateUI(); }
  if(r===0){ deck.push(deck.splice(fi,1)[0]); if(fi>=deck.length)fi=deck.length-1; }
  else fi++;
  ff=false;
  if(fi>=deck.length){ showToast('Крај! Одлично! 🎉'); closeOv('rov'); return; }
  renderRev();
}
function fcNext(){ if(fi<deck.length-1){fi++;ff=false;renderRev();}else showToast('Крај на картички! 🎉'); }
function fcPrev(){ if(fi>0){fi--;ff=false;renderRev();} }

function listH(){
  return `<div class="sec sec-b">📋 Мои зборови</div>
    <input type="text" id="lsrch" class="srch" placeholder="Пребарај…">
    <div id="litems">${S.learned.map((w,i)=>wliH(w,i)).join('')}</div>`;
}
function wliH(w,i){
  return `<div class="wli" onclick="prvWord(${i})">
    <div>
      <div class="wru">${escH(w.ru)}</div>
      <div class="wmk">${escH(w.translit||'')} — ${escH(w.mk||'')}</div>
      <div class="wsrs">${srsTag(w)}</div>
    </div>
    <div class="wli-r">
      <button class="wedit" onclick="event.stopPropagation();quickEdit(${i})" title="Измени превод">✎</button>
      <button class="wdel" onclick="event.stopPropagation();delW(${i})" title="Избриши">✕</button>

}
function fList(){

  document.getElementById('litems').innerHTML=S.learned.map((w,i)=>({w,i}))
    .filter(({w})=>w.ru.includes(q)||( w.mk&&w.mk.toLowerCase().includes(q))||(w.translit&&w.translit.includes(q)))
    .map(({w,i})=>wliH(w,i)).join('');
}
function delW(i){
  const w=S.learned[i]; S.learned.splice(i,1); S.usedRu=S.usedRu.filter(r=>r!==w.ru);
  saveS(); updateUI(); renderRev(); showToast('Избришан.');
}
function prvWord(i){

}
function quickEdit(i){

  setTimeout(()=>{

// ── QUIZ ──────────────────────────────────────────────────────────────────────
let qw=null,qans=false,qCorrectStreak=0,qMode='mc'; // mc=multiple choice, ti=type-in

function openQuiz(){
  openOv('qov'); bumpStreak();
  qCorrectStreak=0; qMode='mc';
  if(S.learned.length<4){
    document.getElementById('qb').innerHTML=`<div class="sec sec-p">🧠 Квиз</div>
      <div class="emp"><div class="ei">🧩</div><p>Потребни се барем 4 зачувани зборови за квизот.</p></div>`; return;
  }
  nextQ();
}

function nextQ(){
  qans=false;
  const due=S.learned.filter(srsDue);
  const pool=due.length?due:S.learned;
  qw=pool[Math.floor(Math.random()*pool.length)];
  const isPhrase=qw.ru.includes(' ');

  const acc=S.qTotal>0?Math.round(S.qCorrect/S.qTotal*100):0;
  const hdr=`
    <div class="sec sec-p">🧠 Квиз</div>
    <div class="qmode-tabs">
      <div class="qmode-tab${qMode==='mc'?' on':''}" onclick="switchQMode('mc')">Избор</div>
      <div class="qmode-tab${qMode==='ti'?' on':''}" onclick="switchQMode('ti')">Пишување</div>
    </div>
    <div class="qsc">
      <span>Точни: ${S.qCorrect}/${S.qTotal} (${acc}%)</span>
      <span class="qsc-streak">🔥 ${qCorrectStreak} по ред</span>
    </div>
    <div class="qq${isPhrase?' phrase':''}">${escH(qw.ru)}</div>
    <div class="qt">${escH(qw.translit||'')}</div>`;

  if(qMode==='mc'){
    // Build 4 options from POOL + learned, diverse selection
    const allMK=[...new Set([
      ...POOL.filter(w=>w.mk&&w.ru!==qw.ru).map(w=>w.mk),
      ...S.learned.filter(w=>w.mk&&w.ru!==qw.ru).map(w=>w.mk)
    ])];
    const wrong=shuf(allMK).slice(0,3);
    // If we couldn't get 3 unique wrong answers, pad with placeholders
    while(wrong.length<3) wrong.push('—');
    const opts=shuf([qw.mk,...wrong]);

    document.getElementById('qb').innerHTML=hdr+`
      <div class="qopts">
        ${opts.map(o=>`<button class="qopt" onclick="qAns(this,${JSON.stringify(o)})">${escH(o)}</button>`).join('')}
      </div>
      <button class="qnext" id="qnxt" onclick="nextQ()">Следно →</button>`;
  } else {
    // Type-in mode
    document.getElementById('qb').innerHTML=hdr+`
      <div class="qtype-wrap">
        <input type="text" id="qtype-inp" class="qtype-inp" placeholder="Напиши го преводот…"
          onkeydown="if(event.key==='Enter')checkTyped()" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <div class="q-result" id="q-res"></div>
        <button class="qcheck" onclick="checkTyped()">Провери</button>
        <button class="qnext" id="qnxt" onclick="nextQ()">Следно →</button>
      </div>`;
    setTimeout(()=>{ const i=document.getElementById('qtype-inp'); if(i) i.focus(); },100);
  }
}

function switchQMode(m){
  qMode=m; qans=false;
  // Re-render with same word but new mode
  if(S.learned.length>=4) nextQ();
}

function qAns(btn,chosen){
  if(qans) return; qans=true;
  S.qTotal++;
  const ok=chosen===qw.mk;
  if(ok){ S.qCorrect++; qCorrectStreak++; btn.classList.add('right'); showToast('Точно! ✓'); }
  else {
    qCorrectStreak=0; btn.classList.add('wrong');
    document.querySelectorAll('.qopt').forEach(b=>{ if(b.textContent.trim()===qw.mk) b.classList.add('right'); });
    showToast(`Погрешно — точно: ${qw.mk}`,'err');
  }
  document.querySelectorAll('.qopt').forEach(b=>b.classList.add('disabled'));
  const idx=S.learned.findIndex(w=>w.ru===qw.ru);
  if(idx>=0){ S.learned[idx]=srsUpdate(S.learned[idx],ok?2:0); saveS(); updateUI(); }
  const nxt=document.getElementById('qnxt'); if(nxt) nxt.style.display='block';
}

function checkTyped(){
  if(qans) return;
  const inp=document.getElementById('qtype-inp');
  if(!inp) return;
  const val=inp.value.trim().toLowerCase();
  if(!val) return;
  qans=true;
  S.qTotal++;
  const correct=qw.mk.toLowerCase().trim();
  // Accept if close enough: exact or one char difference
  const ok=val===correct||levenshtein(val,correct)<=1;
  const res=document.getElementById('q-res');
  if(ok){
    S.qCorrect++; qCorrectStreak++;
    inp.classList.add('right');
    if(res){ res.textContent='✓ Точно!'; res.className='q-result ok'; }
    showToast('Точно! ✓');
  } else {
    qCorrectStreak=0;
    inp.classList.add('wrong');
    if(res){ res.textContent=`✗ Точниот одговор: ${qw.mk}`; res.className='q-result bad'; }
    showToast(`Точно: ${qw.mk}`,'err');
  }
  const idx=S.learned.findIndex(w=>w.ru===qw.ru);
  if(idx>=0){ S.learned[idx]=srsUpdate(S.learned[idx],ok?2:0); saveS(); updateUI(); }
  const nxt=document.getElementById('qnxt'); if(nxt) nxt.style.display='block';
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  if(m===0) return n; if(n===0) return m;
  const d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
  return d[m][n];
}

    <div class="set-section">

      <div class="set-row" onclick="forceRefreshPool()">
        <div>
          <div class="set-row-label">🔄 Освежи речник</div>

        </div>

    <div class="set-section">

        <div class="confirm-btns">

      </div>

      <button class="danger-btn" onclick="showConfirm('reset-all')">⚠️ Целосен ресет на апликацијата</button>
      <div class="confirm-box" id="confirm-reset-all">
        <div class="confirm-text">Ова ќе ги избрише СЕ: зборови, прогрес, streak, уредувања, поставки. Апликацијата ќе се врати на почеток. Навистина сигурен?</div>
        <div class="confirm-btns">
          <button class="confirm-yes" onclick="doReset('all')">Да, ресетирај сè</button>
          <button class="confirm-no" onclick="hideConfirm('reset-all')">Откажи</button>
        </div>

      ${S.learned.length} научени · ${Object.keys(S.edits||{}).length} уредени преводи · Streak: ${S.streak||0} денови
    </div>`;

function showConfirm(id){ document.getElementById('confirm-'+id).classList.add('show'); }
function hideConfirm(id){ document.getElementById('confirm-'+id).classList.remove('show'); }

function doReset(type){
  if(type==='learned'){
    S.learned=[]; S.usedRu=[]; S.qCorrect=0; S.qTotal=0;
    saveS(); updateUI(); closeOv('set-ov');
    showToast('Научените зборови се избришани.');
  } else if(type==='all'){
    localStorage.removeItem(SK);
    if(db){ try{ const t=db.transaction('wp','readwrite'); t.objectStore('wp').clear(); }catch(e){} }
    localStorage.removeItem('rauth');
    showToast('Целосен ресет. Рестартирај ја апликацијата.','warn');
    setTimeout(()=>location.reload(),1500);
  }
}

function exportData(){
  const blob=new Blob([JSON.stringify({state:S,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`russki_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup зачуван!');
}

function importData(input){
  const f=input.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.state){
        Object.assign(S,d.state); saveS(); updateUI();
        showToast(`Прогресот е увезен: ${S.learned.length} зборови`);
        renderSettings();
      } else { showToast('Невалидна backup датотека','err'); }
    }catch(err){ showToast('Грешка при увоз','err'); }
  };
  reader.readAsText(f);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function shuf(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
let _tt;
function showToast(m,type=''){
  const t=document.getElementById('toast');
  t.textContent=m; t.className='toast on'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),2600);
}
